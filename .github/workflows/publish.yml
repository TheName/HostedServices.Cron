name: Publish NuGet

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Test
        run: dotnet test HostedServices.Cron.sln --configuration Release

      - name: Pack
        run: dotnet pack src/HostedServices.Cron/HostedServices.Cron.csproj -c Release -o ./dist

      - name: Push to NuGet
        run: dotnet nuget push ./dist/*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate